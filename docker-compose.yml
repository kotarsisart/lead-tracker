version: '3.9'

services:
  db:
    image: postgres:15
    container_name: lead_tracker_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: lead_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: lead_tracker_backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://admin:admin@db:5432/lead_tracker
    ports:
      - "3001:3000"
    command: sh -c "sleep 5 && npx prisma db push && node dist/src/main.js"

  frontend:
    build: ./frontend
    container_name: lead_tracker_frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"

volumes:
  postgres_data:
